// Ambil semua VM dari Format Get VM (bukan dari loop)
const vmItems = $('Format Get VM').all();

// Kumpulkan semua nama VM
const vmList = vmItems.map((item, index) => {
  const vmName = item.json.vm_name || 'Unknown';
  return `${index + 1}. ✅ ${vmName} — Backup Completed`;
}).join('\n');

// Ambil info server dari On form submission
const formData    = $('On form submission').item.json;
const serverName  = formData['Nama Server']  
                 || formData['Server Name']  
                 || 'Unknown Server';
const requestedBy = formData['Pengaju'] 
                 || 'Unknown';

const timestamp = new Date().toLocaleString('id-ID', {
  timeZone : 'Asia/Jakarta',
  day      : '2-digit',
  month    : 'long',
  year     : 'numeric',
  hour     : '2-digit',
  minute   : '2-digit',
  second   : '2-digit'
});

const subject = `✅ Backup VM Selesai — ${serverName} [${timestamp}]`;

const body = `
<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: 0 auto;">

  <div style="background: #1a73e8; padding: 20px; border-radius: 8px 8px 0 0;">
    <h2 style="color: white; margin: 0;">✅ Backup VM Selesai</h2>
    <p style="color: #e8f0fe; margin: 5px 0 0 0;">Decommission Workflow Notification</p>
  </div>

  <div style="background: #f8f9fa; padding: 20px; border: 1px solid #dadce0;">

    <table style="width: 100%; border-collapse: collapse;">
      <tr>
        <td style="padding: 8px; font-weight: bold; width: 40%; color: #555;">Server</td>
        <td style="padding: 8px;">${serverName}</td>
      </tr>
      <tr style="background: #fff;">
        <td style="padding: 8px; font-weight: bold; color: #555;">Requested By</td>
        <td style="padding: 8px;">${requestedBy}</td>
      </tr>
      <tr>
        <td style="padding: 8px; font-weight: bold; color: #555;">Waktu Backup</td>
        <td style="padding: 8px;">${timestamp}</td>
      </tr>
      <tr style="background: #fff;">
        <td style="padding: 8px; font-weight: bold; color: #555;">Total VM</td>
        <td style="padding: 8px;">${vmItems.length} VM</td>
      </tr>
    </table>

    <div style="margin-top: 20px;">
      <h3 style="color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 8px;">
        📋 Detail VM yang Dibackup
      </h3>
      <div style="background: #fff; border: 1px solid #dadce0; border-radius: 4px; padding: 15px;">
        <pre style="margin: 0; font-family: monospace; font-size: 14px;">${vmList}</pre>
      </div>
    </div>

    <div style="margin-top: 20px; background: #e8f5e9; border-left: 4px solid #34a853; padding: 12px;">
      <p style="margin: 0; color: #2e7d32;">
        <strong>✅ Semua VM berhasil dibackup.</strong><br>
        Silakan lakukan Migrasi hasil backup VM berada di server <strong>${serverName}</strong>. saat ini ke tempat yang sudah di tentukan. 
      </p>
    </div>

  </div>

  <div style="background: #f1f3f4; padding: 12px; border-radius: 0 0 8px 8px; text-align: center;">
    <p style="margin: 0; font-size: 12px; color: #888;">
      Email ini dikirim otomatis oleh n8n Decommission Workflow<br>
      ${timestamp} WIB
    </p>
  </div>

</body>
</html>
`.trim();

return [{
  json: {
    subject,
    body,
    to          : requestedBy,
    server_name : serverName,
    total_vm    : vmItems.length,
    vm_list     : vmList,
    timestamp
  }
}];